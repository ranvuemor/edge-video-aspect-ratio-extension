<!DOCTYPE html>
<html>
<head>
  <title>Video Controls</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h3>Video Controls</h3>

  <div class="section">
    <label for="aspect">Aspect Ratio (width:height):</label>
    <input type="text" id="aspect" placeholder="16:9">
    <div class="aspect-preset-row">
      <button type="button" class="aspect-preset" data-aspect="16:9">16:9</button>
      <button type="button" class="aspect-preset" data-aspect="16:10">16:10</button>
      <button type="button" class="aspect-preset" data-aspect="21:9">21:9</button>
      <button type="button" class="aspect-preset" data-aspect="4:3">4:3</button>
      <button type="button" class="aspect-preset" data-aspect="1:1">1:1</button>
      <button type="button" class="aspect-preset" data-aspect="9:16">9:16</button>
      <button type="button" id="reset-aspect">Reset</button>
    </div>
    <button id="apply-aspect" class="full-width">Apply Aspect Ratio</button>
  </div>

  <div class="section">
    <label for="speed">Playback Speed:</label>
    <input type="number" id="speed" min="0.1" max="16" step="0.05" value="1">
    <div class="preset-row">
      <button type="button" class="speed-preset" data-speed="0.25">0.25x</button>
      <button type="button" class="speed-preset" data-speed="0.5">0.5x</button>
      <button type="button" class="speed-preset" data-speed="1">1x</button>
      <button type="button" class="speed-preset" data-speed="1.5">1.5x</button>
      <button type="button" class="speed-preset" data-speed="2">2x</button>
      <button id="reset-speed" class="full-width" type="button">Reset</button>
    </div>
    <button id="apply-speed" class="full-width">Apply Speed</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
